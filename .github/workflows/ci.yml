name: CI

# GPU-less CI. The runner has no DXR adapter, so this job deliberately does NOT
# run tools/smoke_test.ps1 — that harness requires a real device, a Debug build
# and dxcompiler.dll/dxil.dll. It builds everything and runs the CPU-only unit
# test target (TheDawningTests), which links no graphics libraries.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  windows-debug:
    name: Windows / MSVC 2022 / Debug
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      # Builds both TheDawningV3.exe and TheDawningTests.exe.
      - name: Build (Debug)
        run: cmake --build build --config Debug

      - name: Unit tests
        run: ctest --test-dir build -C Debug --output-on-failure
